<div class="chat-history" *ngIf="history.length">
  <h5 class="history-title">{{ 'components.issues.chat.HISTORY' | translate }}</h5>
  <div *ngFor="let h of history; trackBy: trackByIndex" class="chat-history-item">
    <ng-container *ngIf="h.avatar_url; else historyInitialsTpl">
      <p-avatar [image]="h.avatar_url" shape="circle" styleClass="mr-2"></p-avatar>
    </ng-container>
    <ng-template #historyInitialsTpl>
      <p-avatar [label]="avatarService.initialsFromName(h.author)" shape="circle"
        [style]="{ 'background-color': avatarService.issueAvatarColor(h.user ?? { first_name: h.author }), color: avatarService.issueAvatarTextColor(h.user ?? { first_name: h.author }) }" styleClass="mr-2"></p-avatar>
    </ng-template>
    <div class="chat-history-body">
      <div class="msg-header">
        <div class="font-medium">{{ h.author }}</div>
        <div class="msg-time text-sm text-surface-500">{{ h.time ? (h.time | date:'short') : '' }}</div>
      </div>
      <div class="text-sm text-surface-500" [innerHTML]="h.text"></div>
    </div>
  </div>
</div>
